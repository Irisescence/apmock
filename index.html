<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AP Practice Exam · Exam List</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app-wrapper">
  <header class="app-header">
    <div class="logo-area">
      <h1>📚 AP Practice Exam</h1>
      <div style="color:#5b6778;">Hello</div>
    </div>
    <div id="authContainer"></div>
    <div class="header-actions" id="teacherActions">
      <div class="teacher-create-menu">
        <button class="btn btn-primary" id="newExamMenuBtn" type="button">+ 新建试卷</button>
        <div class="teacher-create-dropdown hidden" id="newExamMenu">
          <button type="button" id="docxFolderImportBtn">上传文件夹</button>
          <button type="button" id="addExamBtn">手动输入</button>
        </div>
      </div>
    </div>
  </header>

  <!-- 主页视图 -->
  <div class="exam-filter-bar">
    <label for="subjectFilter">科目筛选</label>
    <select id="subjectFilter">
      <option value="all">全部科目</option>
      <option value="AP Calculus AB">AP Calculus AB</option>
      <option value="AP Calculus BC">AP Calculus BC</option>
      <option value="AP Chemistry">AP Chemistry</option>
      <option value="AP MacroEconomics">AP MacroEconomics</option>
      <option value="AP MicroEconomics">AP MicroEconomics</option>
      <option value="AP Statistics">AP Statistics</option>
    </select>
  </div>
  <div id="homeView" class="view-container">
    <div class="exam-grid" id="examGridContainer"></div>
  </div>

  <!-- 编辑器模态框 -->
  <div id="editorModal" class="modal-overlay hidden">
    <div class="modal" style="max-width: 900px;">
      <div class="modal-header">
        <h2 class="modal-title" id="modalTitle">编辑试卷</h2>
        <button class="icon-btn" onclick="closeEditor()">✕</button>
      </div>
            <form id="examForm">
        <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px;">
          <div class="form-group">
            <label>科目</label>
            <select id="examSubject" required>
              <option value="">请选择 AP 科目</option>
              <option value="AP Calculus AB">AP Calculus AB</option>
              <option value="AP Calculus BC">AP Calculus BC</option>
              <option value="AP Chemistry">AP Chemistry</option>
              <option value="AP MacroEconomics">AP MacroEconomics</option>
              <option value="AP MicroEconomics">AP MicroEconomics</option>
              <option value="AP Statistics">AP Statistics</option>
            </select>
          </div>
          <div class="form-group">
            <label>试卷标题</label>
            <input type="text" id="examTitle" placeholder="例如：AP Calculus AB Practice Test" required>
          </div>
          <div class="form-group">
            <label>可见性</label>
            <select id="examVisibility">
              <option value="private">仅自己可见</option>
              <option value="public">公开</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label>试卷描述</label>
          <textarea id="examDesc" rows="2" placeholder="年份 + 科目 + 场次 + 来源，例如：2022 AP Calculus AB - Form A (Official)" required></textarea>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
          <div class="form-group">
            <label>考试时间（分钟）</label>
            <input type="number" id="examTime" value="45" min="1" required>
          </div>
          <div class="form-group cloud-mcq-only">
            <label>题目类型</label>
            <select id="examType" required>
              <option value="mcq">选择题 (MCQ)</option>
            </select>
          </div>
        </div>

        <div class="questions-editor">
          <h3 style="margin-bottom:16px;">题目列表</h3>
          <div id="questionsList"></div>
          <button type="button" class="btn btn-outline btn-sm" onclick="addQuestion()">添加题目</button>
        </div>

        <div style="display:flex; gap:12px; margin-top:28px;">
          <button type="submit" class="btn btn-primary" style="flex:1;">保存试卷</button>
          <button type="button" class="btn btn-outline" onclick="closeEditor()">取消</button>
        </div>
      </form>
    </div>
  </div>

  <input type="file" id="imageUploadInput" accept="image/*" style="display:none;">
  <input type="file" id="docxFolderInput" webkitdirectory multiple style="display:none;">
  
  <div class="footer-note">
    ⏱️ 点击卡片开始考试 · 悬停显示编辑选项
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/mammoth@1.8.0/mammoth.browser.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<script src="js/auth.js"></script>
<script src="js/database.js"></script>
<script src="js/main.js"></script>
<script src="js/import-docx.js"></script>
</body>
</html>
